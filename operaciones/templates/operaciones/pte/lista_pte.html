{% extends 'operaciones/base.html' %}
{% load static %}
{% block titulos %}
<div class="header-modulo">
    <div class="header-modulo-container">
        <div class="header-title-section">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item">
                        <a href="{% url 'operaciones:index' %}" class="text-decoration-none">
                            Inicio
                        </a>
                    </li>
                    <li class="breadcrumb-item active">PTE's</li>
                </ol>
            </nav>
            <h1 class="h2 fw-bold mb-0">PROPUESTA TECNICA ECONOMICA</h1>
        </div>
        <div class="header-buttons-section">
            <a href="#" class="btn btn-primary crear-pte">
                <i class="fas fa-plus me-2"></i>
                <span>Crear nuevo</span>
            </a>
            <button class="btn btn-outline-secondary" id="btn-panel-filtros">
                <i class="fas fa-filter me-2"></i>
                Filtros
            </button>
        </div>
    </div>
</div>
{%endblock%}
{% block content %}
<div class="bm-content">
    <div class="bm-cont-elementos">
        <div class="bm-cont-elementos-body">
            <div class="row mb-3">
                <div class="col-md-6 col-lg-4">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" class="form-control border-start-0" id="filtro-buscar" placeholder="Enter para filtrar">
                    </div>
                </div>
                <div class="col-md-2 col-lg-2">
                    <div id="select-length"></div>
                </div>
            </div>
            <!-- Tabla -->
            <table id="tabla" class="table table-hover dataTable-width-100">
            </table>
        </div>
    </div>
</div>

<!-- Panel de Filtros con Offcanvas de Bootstrap 5 -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="panelFiltros">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Filtros</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <form id="form-filtros">
            <div class="mb-3">
                <label class="form-label">Responsable proyecto</label>
                <select class="form-select" id="id_responsable_proyecto">
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Año</label>
                <select class="form-select" id="anio">
                    <option value="" selected disabled>Seleccione un año</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Estatus</label>
                <select class="form-select" id="estatus">
                    <option value="" selected disabled>Seleccione un estatus</option>
                    <option value="1">PENDIENTE</option>
                    <option value="2">PROCESO</option>
                    <option value="3">ENTREGADA</option>
                    <option value="4">CANCELADA</option>
                    <option value="9">SUSPENDIDA</option>

                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo</label>
                <select class="form-select" id="tipo">
                    <option value="" selected disabled>Seleccione un tipo</option>
                    <option value="1">PTE</option>
                    <option value="2">LICITACION</option>
                    <option value="3">COSTEO CLASE V</option>
                    <option value="10">COSTEO CLASE IV</option>
                    <option value="11">COSTEO CLASE III</option>
                    <option value="12">OBRA</option>
                    <option value="14">MERCADEOS</option>
                    <option value="13">UDC</option>
                </select>
            </div>
            <div class="d-grid gap-2">
                <button type="button" class="btn btn-primary" id="aplicar-filtros">
                    <i class="fas fa-check me-2"></i>Aplicar Filtros
                </button>
                <button type="button" class="btn btn-outline-secondary" id="limpiar-filtros">
                    <i class="fas fa-eraser me-2"></i>Limpiar Filtros
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Modal para crear PTE -->
<div class="modal fade" id="modalCrearPTE" tabindex="-1" aria-labelledby="modalCrearPTELabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalCrearPTELabel">Crear Nuevo PTE</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formCrearPTE">
                    {% csrf_token %}
                    <div class="row">
                        <!-- Descripción del trabajo (ocupa todo el ancho) -->
                        <input type="hidden" id="pte_id" name="id">
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label for="descripcion_trabajo" class="form-label">
                                    Descripción del Trabajo
                                </label>
                                <textarea class="form-control" id="descripcion_trabajo" name="descripcion_trabajo" rows="2" required></textarea>
                            </div>
                        </div>
                        <!-- Fila dividida en 6 y 6 -->
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="oficio_pte" class="form-label">Folio PTE</label>
                                <input type="text" class="form-control" id="oficio_pte" name="oficio_pte" required>
                            </div>
                            <div class="mb-3">
                                <label for="responsable_proyecto" class="form-label">Responsable del Proyecto <span class="text-danger">*</span></label>
                                <select class="form-select" id="responsable_proyecto" name="responsable_proyecto" required>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="id_tipo" class="form-label">Tipo <span class="text-danger">*</span></label>
                                <select class="form-select" id="id_tipo" name="id_tipo" required>
                                    <option value="" selected disabled>Seleccione un tipo</option>
                                    <option value="1">PTE</option>
                                    <option value="2">LICITACION</option>
                                    <option value="3">COSTEO CLASE V</option>
                                    <option value="10">COSTEO CLASE IV</option>
                                    <option value="11">COSTEO CLASE III</option>
                                    <option value="12">OBRA</option>
                                    <option value="14">MERCADEOS</option>
                                    <option value="13">UDC</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="id_prioridad" class="form-label">Prioridad <span class="text-danger">*</span></label>
                                <select class="form-select" id="id_prioridad" name="id_prioridad" required>
                                    <option value="" selected disabled>Seleccione una opcion</option>
                                    <option value="1">ALTA</option>
                                    <option value="2">MEDIA</option>
                                    <option value="3">BAJA</option>
                                    <option value="4">TBD</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="oficio_ot" class="form-label">Oficio OT</label>
                                <input type="text" class="form-control" id="oficio_ot" name="oficio_ot" placeholder="SIN OT RELACIONADA" disabled>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="oficio_pte" class="form-label">Oficio Solicitud</label>
                                <input type="text" class="form-control" id="oficio_solicitud" name="oficio_solicitud" required>
                            </div>
                            <div class="mb-3">
                                <label for="fecha_solicitud" class="form-label">Fecha de Solicitud</label>
                                <input type="date" class="form-control" id="fecha_solicitud" name="fecha_solicitud">
                            </div>
                            <div class="mb-3">
                                <label for="fecha_entrega" class="form-label">Fecha de Entrega</label>
                                <input type="date" class="form-control" id="fecha_entrega" name="fecha_entrega">
                            </div>
                            <div class="mb-3">
                                <label for="plazo_dias" class="form-label">Plazo en Días</label>
                                <input type="number" class="form-control" id="plazo_dias" name="plazo_dias" min="0">
                            </div>
                            <div class="mb-3">
                                <label for="total_homologado" class="form-label">Total homologado</label>
                                <div class="input-group mt-1">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="total_homologado" name="total_homologado" min="0" value="0">
                                </div>
                            </div>
                        </div>
                        <!-- Comentario General (ocupa todo el ancho) -->
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label for="comentario_general" class="form-label">Comentario</label>
                                <textarea class="form-control" id="comentario_general" name="comentario_general" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="btnGuardarPTE">
                    <i class="fas fa-save me-2"></i>Guardar PTE
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal para subir archivo a pasos de PTE -->
<div class="modal fade" id="modalSubirArchivo" tabindex="-1" aria-labelledby="modalSubirArchivoLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalSubirArchivoLabel">Subir archivo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formSubirArchivo">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="enlaceArchivo" class="form-label">
                            Enlace del archivo
                        </label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="enlaceArchivo" name="enlaceArchivo" placeholder="Pega el enlace aquí..." required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="guardarEnlaceArchivo()">
                    <i class="fas fa-save me-2"></i>Guardar
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times me-2"></i>Cancelar
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{% static 'operaciones/js/modulos/pte/lista_pte.js'%}?v=1.0.2"></script>

<script>
    var urlDatatable = "{% url 'operaciones:datatable_ptes' %}";
    var urlDatatableDetalle = "{% url 'operaciones:datatable_pte_detalle' %}";
    var urlObtenerPasos = "{% url 'operaciones:obtener_pasos_pte' %}";
    var urlCrearPTE = "{% url 'operaciones:crear_pte' %}";
    var urlObtenerResponsables = "{% url 'operaciones:obtener_responsables_proyecto' %}";
    var urlCambiarEstatusPaso = "{% url 'operaciones:cambiar_estatus_paso' %}";
    var urlObtenerDatos = "{% url 'operaciones:obtener_datos_pte' %}";
    var urlEditarPTE = "{% url 'operaciones:editar_pte' %}";
    var urlEliminarPTE = "{% url 'operaciones:eliminar_pte' %}";
    var urlCrearOT = "{% url 'operaciones:crear_ot_desde_pte' %}";
    var urlDatatableSubpasos = "{% url 'operaciones:datatable_subpasos' %}";
    var urlObtenerProgresoPaso4 = "{% url 'operaciones:obtener_progreso_paso4' %}";
    var urlObtenerProgresoGeneralPTE  = "{% url 'operaciones:obtener_progreso_general_pte' %}";
    var urlActualizarFecha  = "{% url 'operaciones:actualizar_fecha' %}";
    var urlCambiarEstatusPTE  = "{% url 'operaciones:cambiar_estatus_pte' %}";
    var urlGuardarArchivo  = "{% url 'operaciones:guardar_archivo_pte' %}";
    const puedeEliminarPte = {{ perms.operaciones.delete_pteheader|yesno:"true,false" }};
    
</script>
{% endblock %}
