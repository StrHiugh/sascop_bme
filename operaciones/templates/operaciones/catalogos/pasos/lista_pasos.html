{% extends 'operaciones/base.html' %}
{% load static %}

{% block content %}
<div class="header-modulo">
    <div class="d-flex justify-content-between align-items-center flex-wrap">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item">
                        <a href="{% url 'operaciones:index' %}" class="text-decoration-none">
                            Inicio
                        </a>
                    </li>
                    <li class="breadcrumb-item">
                        <a href="#" class="text-decoration-none">
                            Catálogos
                        </a>
                    </li>
                    <li class="breadcrumb-item active">Pasos </li>
                </ol>
            </nav>
            <h1 class="h2 fw-bold mb-0">PASOS PTE</h1>
        </div>
        <!-- Lado derecho: botones -->
        <div class="d-flex gap-2 mt-2 mt-md-0">
            <a href="#" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>
                <span>Crear nuevo</span>
            </a>
        </div>
    </div>
</div>


<div class="bm-content">
    <div class="bm-cont-elementos">
        <div class="bm-cont-elementos-body">
            <div class="row mb-3">
                <div class="col-md-6 col-lg-4">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" class="form-control border-start-0" id="filtro-buscar" placeholder="Enter para filtrar">
                    </div>
                </div>
                <div class="col-md-2 col-lg-2">
                    <div id="select-length"></div>
                </div>
            </div>
            <!-- Tabla -->
            <table id="tabla" class="table table-hover dataTable-width-100">
            </table>
        </div>
    </div>
</div>

<!-- Panel de Filtros con Offcanvas de Bootstrap 5 -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="panelFiltros">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Filtros</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <form id="form-filtros">
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select class="form-select" id="filtro-estado">
                    <option value="">Todos los estados</option>
                    <option value="disponible">Disponible</option>
                    <option value="no-disponible">No disponible</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo</label>
                <select class="form-select" id="filtro-tipo">
                    <option value="">Todos los tipos</option>
                    <option value="computadora">Computadora</option>
                    <option value="servidor">Servidor</option>
                </select>
            </div>
            <div class="d-grid gap-2">
                <button type="button" class="btn btn-primary" id="aplicar-filtros">
                    <i class="fas fa-check me-2"></i>Aplicar Filtros
                </button>
            </div>
        </form>
    </div>
</div>
<!-- Panel Crear/Editar Estatus -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="panelCrearEditar">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="panel-title">Crear nuevo paso</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <form id="formulario-paso">
            {% csrf_token %}
            <!-- Campo oculto para ID -->
            <input id="id" name="id" type="hidden">
            <div class="row">
                <section class="col-12 mb-3">
                    <label class="form-label">Descripción <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <input name="descripcion" class="form-control" id="descripcion" 
                                type="text" placeholder="Ingrese la descripción del paso" required>
                    </div>
                </section>
                <section class="col-12 mb-3">
                    <label class="form-label">Orden <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <input name="orden" class="form-control" id="orden" 
                                type="number" step="0.1" placeholder="Ingrese orden del paso" required>
                    </div>
                </section>
                <section class="col-12 mb-3">
                    <label class="form-label">Importancia(%) <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <input name="importancia" class="form-control" id="importancia" 
                                type="number" step="0.1" placeholder="Ingrese la importancia en (%)" required>
                    </div>
                </section>
                <section class="col-12 mb-3">
                    <label class="form-label">Comentario</label>
                    <textarea name="comentario" class="form-control" id="comentario" 
                                rows="3" placeholder="Comentarios adicionales"></textarea>
                </section>
            </div>

            <section class="col-12 mb-3">
                <p class="text-muted"><i class="text-danger">*</i> Campos obligatorios</p>
            </section>

            <div class="row mt-4">
                <div class="col-12">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-primary" id="btn-guardar">
                            <i class="fas fa-save me-2"></i>Guardar
                        </button>
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="offcanvas">
                            <i class="fas fa-times me-2"></i>Cancelar
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{% static 'operaciones/js/modulos/pte/catalogos/lista_pasos.js'%}?v=1.0.0"></script>

<script>
    var urlDatatable = "{% url 'operaciones:datatable_pasos' %}";
    var urlCrearPaso = "{% url 'operaciones:crear_paso' %}";
    var urlEditarPaso = "{% url 'operaciones:editar_paso' %}";
    var urlEliminarPaso = "{% url 'operaciones:eliminar_paso' %}";
    var urlObtenerPaso = "{% url 'operaciones:obtener_paso' %}";
</script>
{% endblock %}
