{% block scripts %}
<script>
// URL para la API de actividad reciente
const urlActividadReciente = '{% url "operaciones:datatable_registro_actividad" %}';

$(document).ready(function() {
    // Manejar cambio de tabs de Power BI
    $('#powerbiTabs button').on('click', function (e) {
        // Remover active de todos los tabs
        $('#powerbiTabs .nav-link').removeClass('active text-dark').addClass('text-secondary');
        $('#powerbiTabs .nav-link').removeClass('fw-semibold').addClass('fw-medium');
        
        // Agregar active al tab clickeado
        $(this).removeClass('text-secondary').addClass('active text-dark fw-semibold');
        
        // Mostrar el contenido correspondiente
        const target = $(this).data('bs-target');
        $('.tab-pane').removeClass('show active');
        $(target).addClass('show active');
    });

    // Cargar estadísticas adicionales
    function cargarEstadisticas() {
        $.ajax({
            url: '{% url "operaciones:api_estadisticas" %}',
            method: 'GET',
            success: function(data) {
                $('#volumen-total').text(data.volumen_total.toLocaleString());
            },
            error: function() {
            }
        });
    }
    
    // Función para cargar actividad reciente
    function cargarActividadReciente() {
        $.ajax({
            url: urlActividadReciente,
            type: "GET",
            data: {
                start: 0,
                length: 4,
                order: [{ column: 4, dir: 'desc' }]
            },
            success: function(response) {
                if (response.data && response.data.length > 0) {
                    let html = '';
                    response.data.forEach(function(actividad) {
                        let eventoClass = 'bg-secondary';
                        switch(actividad.evento) {
                            case 'CREAR': eventoClass = 'bg-success'; break;
                            case 'MODIFICAR': eventoClass = 'bg-warning'; break;
                            case 'ELIMINAR': eventoClass = 'bg-danger'; break;
                            case 'ACTUALIZAR': eventoClass = 'bg-info'; break;
                            case 'REGISTRAR': eventoClass = 'bg-primary'; break;
                        }
                        
                        let descripcion = actividad.detalle_evento || '';
                        
                        html += `
                            <tr>
                                <td>
                                    <span class="badge bg-light text-dark">${actividad.afectacion || 'Sistema'}</span>
                                </td>
                                <td>
                                    <span class="badge ${eventoClass}">${actividad.evento}</span>
                                </td>
                                <td class="small">
                                    ${actividad.fecha_formateada || '--'}
                                </td>
                                <td>
                                    <div>
                                        <strong class="d-block">${actividad.nombre_completo || 'Usuario'}</strong>
                                        <small class="text-muted">${actividad.email || ''}</small>
                                    </div>
                                </td>
                                <td>
                                    <div class="descripcion-actividad">
                                        ${fnFormatDescripcion(actividad)}
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                    
                    $('#actividad-reciente').html(html);
                } else {
                    $('#actividad-reciente').html(`
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="fas fa-inbox me-2"></i>No hay actividad reciente
                            </td>
                        </tr>
                    `);
                }
            },
            error: function(xhr, status, error) {
                $('#actividad-reciente').html(`
                    <tr>
                        <td colspan="5" class="text-center text-danger py-4">
                            <i class="fas fa-exclamation-triangle me-2"></i>Error al cargar actividad
                        </td>
                    </tr>
                `);
            }
        });
    }
    
    // Inicializar
    cargarEstadisticas();
    cargarActividadReciente();
    
    // Actualizar actividad cada 60 segundos
    setInterval(function() {
        cargarActividadReciente();
    }, 60000);
});

// Función para recargar actividad manualmente
function cargarActividadReciente() {
    const spinner = $('#actividad-reciente');
    spinner.html(`
        <tr>
            <td colspan="5" class="text-center py-5">
                <i class="fas fa-spinner fa-spin me-2"></i>Cargando actividad...
            </td>
        </tr>
    `);
    
    $(document).ready(function() {
        $.ajax({
            url: urlActividadReciente,
            type: "GET",
            data: {
                start: 0,
                length: 4,
                order: [{ column: 4, dir: 'desc' }]
            },
            success: function(response) {
                let html = '';
                if (response.data && response.data.length > 0) {
                    response.data.forEach(function(actividad) {
                        let eventoClass = 'bg-secondary';
                        switch(actividad.evento) {
                            case 'CREAR': eventoClass = 'bg-success'; break;
                            case 'MODIFICAR': eventoClass = 'bg-warning'; break;
                            case 'ELIMINAR': eventoClass = 'bg-danger'; break;
                            case 'ACTUALIZAR': eventoClass = 'bg-info'; break;
                            case 'REGISTRAR': eventoClass = 'bg-primary'; break;
                        }
                        
                        let descripcion = actividad.detalle_evento || '';
                        
                        html += `
                            <tr>
                                <td><span class="badge bg-light text-dark">${actividad.afectacion || 'Sistema'}</span></td>
                                <td><span class="badge ${eventoClass}">${actividad.evento}</span></td>
                                <td class="small">${actividad.fecha_formateada || '--'}</td>
                                <td>
                                    <strong class="d-block">${actividad.nombre_completo || 'Usuario'}</strong>
                                    <small class="text-muted">${actividad.email || ''}</small>
                                </td>
                                <td>
                                    <div class="descripcion-actividad">
                                        ${fnFormatDescripcion(actividad)}
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    html = `
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="fas fa-inbox me-2"></i>No hay actividad reciente
                            </td>
                        </tr>
                    `;
                }
                $('#actividad-reciente').html(html);
            },
            error: function() {
                $('#actividad-reciente').html(`
                    <tr>
                        <td colspan="5" class="text-center text-danger py-4">
                            <i class="fas fa-exclamation-triangle me-2"></i>Error al cargar actividad
                        </td>
                    </tr>
                `);
            }
        });
    });
}

// Redimensionar el gráfico cuando cambie el tamaño de la ventana
window.addEventListener('resize', function() {
    if (window.myChart) {
        window.myChart.resize();
    }
});
</script>
