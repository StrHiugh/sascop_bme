<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BME SUBTEC</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" rel="stylesheet">
    
    <!-- Custom CSS -->
    {% load static %}
    <link href="{% static 'operaciones/css/login.css' %}" rel="stylesheet">
</head>
<body class="login-body">
    <div class="wrap-login-registro">
        <!-- Imagen lateral -->
        <div class="img-login-registro bg-login">
            <div class="img-login-registro-info">
                <div class="login-brand">
                    <img src="{% static 'operaciones/images/logo_bm.svg' %}" alt="BME SUBTEC" class="login-logo">
                    <h1 class="login-company-name">SASCOP</h1>

                </div>
            </div>
        </div>

        <!-- Formulario de login -->
        <div class="info-login-registro">
            {% comment %} <img class="login-form-logo" src="{% static 'operaciones/images/logo_bm.svg' %}" alt="BME SUBTEC"> {% endcomment %}
            <h3 class="login-title">
                INICIAR SESIÓN
            </h3>
            <p class="login-subtitle">
                Ingrese sus datos para iniciar sesión.
            </p>

            <form class="login-form" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <input class="form-input" type="text" name="username" placeholder="Usuario" required>
                    <i class="fas fa-user input-icon"></i>
                </div>
                <div class="form-group">
                    <input class="form-input" type="password" name="password" placeholder="Contraseña" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>
                <button type="submit" class="login-btn">
                    INICIAR SESIÓN
                </button>
            </form>

            <a href="#" class="forgot-password-link">
                ¿Olvidó su contraseña?
            </a>
        </div>

        <!-- Recuperar contraseña (oculto por defecto) -->
        <div class="info-recuperar-password" style="display: none;">
            <div id="div-contenedor-recuperar-password">
                <button id="btn-close" class="close-btn">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <i class="fas fa-redo-alt recovery-icon"></i>
                <h3 class="recovery-title">
                    RECUPERAR CONTRASEÑA
                </h3>
                <p class="recovery-subtitle">
                    Ingrese la dirección de correo electrónico asociada a su cuenta.
                </p>
                <form class="recovery-form">
                    <div class="form-group">
                        <input class="form-input" type="email" name="email" placeholder="Correo electrónico" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                    <button type="button" class="recovery-btn">
                        RECUPERAR
                    </button>
                </form>
                <a href="#" class="back-to-login-link">
                    <i class="fas fa-arrow-left"></i>
                    Regresar a iniciar sesión
                </a>
            </div>
        </div>
    </div>
    <script>
        // Variables para validar
        var loginError = {{ login_error|yesno:"true,false" }};
        var errorMessage = "{{ error_message|default:'' }}";
        var userAuthenticated = {{ user.is_authenticated|yesno:"true,false" }};
        //Si la página viene del cache, recargar
        if (performance.navigation.type === 2) {
            window.location.reload();
        }
        
        // Prevenir reenvío del formulario
        if (window.history && window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{% static 'operaciones/js/login.js' %}?v=1.0.0"></script>
    <script src="{% static 'operaciones/js/utils/default.js' %}?v=1.0.0"></script>
    <script src="{% static 'operaciones/js/utils/SmartNotification.js' %}?v=1.0.0"></script>

</body>
</html>
